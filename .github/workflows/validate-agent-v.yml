name: validate agent_v subscription headers

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          dotnet-version: '10.0.1xx'
      - name: Run ServiceLib tests
        working-directory: ./v2rayN
        run: dotnet test ./ServiceLib.Tests/ServiceLib.Tests.csproj -c Release

  build-windows:
    uses: ./.github/workflows/build.yml
    with:
      target: windows
      project: ./v2rayN/v2rayN.csproj
